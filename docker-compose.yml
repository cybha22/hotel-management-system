services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lokanata-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: "Lokanata Hotel"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: lokanata_hotel
      DB_USERNAME: lokanata
      DB_PASSWORD: lokanata_secret
      SANCTUM_STATEFUL_DOMAINS: "localhost:3000,localhost:8000"
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    networks:
      - lokanata-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lokanata-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    networks:
      - lokanata-net

  db:
    image: mysql:8.0
    container_name: lokanata-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: lokanata_hotel
      MYSQL_USER: lokanata
      MYSQL_PASSWORD: lokanata_secret
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lokanata-net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: lokanata-pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root_secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lokanata-net

volumes:
  db-data:
  backend-vendor:
  frontend-node-modules:

networks:
  lokanata-net:
    driver: bridge
